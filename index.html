<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4択クイズ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="logo">Quiz<span>Gen</span></div>
    <div class="header-info" id="headerInfo"></div>
  </header>

  <div id="loadingMsg">
    <div class="spinner"></div>
    問題を読み込み中…
  </div>

  <div id="setupScreen" class="screen">
    <div class="setup-title">
      クイズの設定
      <small id="totalBadge"></small>
    </div>

    <div class="stats-bar" id="statsBadge"></div>

    <div class="setup-section">
      <div class="setup-label">問題数</div>
      <div class="count-grid" id="countGrid"></div>
    </div>

    <div class="setup-section">
      <div class="setup-label">オプション</div>
      <div class="toggle-row">
        <label class="toggle-item">
          <div class="toggle-label">
            制限時間を計測する
            <small>タイマーによる時間計測を行います</small>
          </div>
          <div class="toggle-switch">
            <input type="checkbox" id="useTimer" >
            <div class="toggle-track"></div>
          </div>
        </label>
        <label class="toggle-item">
          <div class="toggle-label">
            問題をシャッフル
            <small>出題順をランダムにする</small>
          </div>
          <div class="toggle-switch">
            <input type="checkbox" id="shuffleQ" >
            <div class="toggle-track"></div>
          </div>
        </label>
        <label class="toggle-item">
          <div class="toggle-label">
            選択肢をシャッフル
            <small>①②③④の順をランダムにする</small>
          </div>
          <div class="toggle-switch">
            <input type="checkbox" id="shuffleC"  onchange="UI.handleShuffleCChange()">
            <div class="toggle-track"></div>
          </div>
        </label>
        <label class="toggle-item">
          <div class="toggle-label">
            解説を表示する
            <small>回答後に解説を表示する</small>
          </div>
          <div class="toggle-switch">
            <input type="checkbox" id="showExp" checked>
            <div class="toggle-track"></div>
          </div>
        </label>
      </div>
    </div>

    <div class="setup-section">
      <div class="setup-label">個別問題選択</div>
      <button class="btn btn-ghost" id="toggleListBtn" onclick="UI.toggleQuestionList()" style="width: 100%; text-align: left; display: flex; justify-content: space-between; align-items: center;">
        <span>問題一覧から選んで解く</span>
        <span id="listArrow">▼</span>
      </button>
      
      <div class="select-list-container" id="selectListContainer">
        <div style="padding: 12px; display: flex; gap: 8px; align-items: center; border-bottom: 1px solid var(--border); background: var(--surface2); font-size: 13px;">
          <input type="number" id="rangeStart" placeholder="開始" style="width: 60px; padding: 6px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: #fff; text-align: center;">
          <span>問目 から</span>
          <input type="number" id="rangeEnd" placeholder="終了" style="width: 60px; padding: 6px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: #fff; text-align: center;">
          <span>問目 まで</span>
          <button class="btn btn-primary" style="padding: 6px 12px; font-size: 12px; margin-left: auto;" onclick="UI.selectRange()">選択</button>
        </div>

        <div style="padding: 12px; border-bottom: 1px solid var(--border); background: var(--surface2);">
          <button class="btn btn-primary" style="width: 100%; padding: 10px;" onclick="UI.startSelectedQuestions()">
            選択した問題を解く (計<span id="selectedCountBadge">0</span>問)
          </button>
        </div>

        <div class="select-list" id="individualQList"></div>
      </div>
    </div>

    <button class="btn btn-primary" id="startBtn" onclick="UI.startQuiz()">クイズを開始する →</button>
    
    <button class="btn btn-ghost" id="flashcardBtn" style="width: 100%; padding: 14px; font-size: 15px; margin-top: 12px; border: 1px solid var(--border);" onclick="UI.startFlashcards()">
      🃏 フラッシュカード（暗記モード）を始める
    </button>
  </div>

  <div id="quizScreen" class="screen">
    <div class="quiz-topbar">
      <div class="q-counter">問題 <strong id="qNum">1</strong> / <span id="qTotal">10</span></div>
      <div class="timer" id="timerEl">0:00</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="correct-track" id="correctTrack"></div>

    <div class="question-box" id="questionText"></div>
    <div class="choices" id="choicesArea"></div>

    <div class="explanation" id="explanation">
      <div class="ex-tag">解説</div>
      <div id="explanationText"></div>
    </div>

    <div class="nav-row">
      <button class="btn btn-ghost" id="backBtn" onclick="UI.goBack()">← 前へ</button>
      <button class="btn btn-primary" id="nextBtn" onclick="UI.goNext()" style="display:none">次へ →</button>
      <button class="btn btn-warn" id="abortBtn" onclick="UI.abortQuiz()" style="margin-left: auto;">途中終了</button>
    </div>
  </div>

  <div id="flashcardScreen" class="screen">
    <div class="quiz-topbar">
      <button class="btn btn-ghost" style="padding: 6px 12px; font-size: 13px;" onclick="UI.stopAutoCard(); UI.goSetup()">✕ 中断</button>
      <div class="q-counter">カード <strong id="cardProgress">0 / 0</strong></div>
      <div style="width: 60px;"></div>
    </div>

    <div style="max-width: 400px; margin: 10px auto; padding: 12px; background: var(--surface2); border-radius: 12px; border: 1px solid var(--border); font-size: 13px;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <span style="font-weight: bold;">🔄 自動めくり（オートモード）</span>
        <label class="toggle-switch" style="width: 44px; height: 24px;">
          <input type="checkbox" id="autoCardToggle" onchange="UI.handleAutoCardToggle()">
          <div class="toggle-track"></div>
        </label>
      </div>
      <div style="display: flex; gap: 12px; align-items: center; color: var(--text3);">
        <label style="display: flex; align-items: center; gap: 4px;">
          表(問題): <input type="number" id="timeFront" value="5" min="1" style="width: 45px; padding: 4px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg); color: #fff; text-align: center;"> 秒
        </label>
        <label style="display: flex; align-items: center; gap: 4px;">
          裏(解答): <input type="number" id="timeBack" value="4" min="1" style="width: 45px; padding: 4px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg); color: #fff; text-align: center;"> 秒
        </label>
      </div>
    </div>

    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 50vh; padding: 12px 0;">
      <div class="card-flip-container" id="cardFlipContainer" onclick="UI.toggleCardFlip()">
        <div class="card-inner">
          <div class="card-front">
            <div class="card-tag">QUESTION</div>
            <div class="card-text" id="cardQuestionText">問題文</div>
            <div class="card-hint">タップで答えを表示</div>
          </div>
          <div class="card-back">
            <div class="card-tag" style="background: #e11d48;">ANSWER</div>
            <div class="card-text" id="cardAnswerText">正解の選択肢</div>
            <div class="card-exp" id="cardExpText">ここに解説が入ります</div>
            <div class="card-hint">タップで問題に戻る</div>
          </div>
        </div>
      </div>

      <div style="display: flex; gap: 16px; width: 100%; max-width: 400px; margin-top: 24px;">
        <button class="btn btn-ghost" id="cardPrevBtn" style="flex: 1; padding: 12px;" onclick="UI.prevCard()">← 前へ</button>
        <button class="btn btn-primary" id="cardNextBtn" style="flex: 1; padding: 12px;" onclick="UI.nextCard()">次へ →</button>
      </div>
    </div>
  </div>

  <div id="resultScreen" class="screen">
    <div class="result-hero">
      <div class="score-ring">
        <div class="score-big" id="finalScore"></div>
        <div class="score-of">正解</div>
      </div>
      <div class="result-title" id="resultTitle"></div>
      <div class="result-elapsed" id="resultElapsed"></div>
    </div>

    <div class="result-stats">
      <div class="stat-card"><div class="sv" id="statCorrect"></div><div class="sl">正解</div></div>
      <div class="stat-card"><div class="sv" id="statWrong"></div><div class="sl">不正解</div></div>
      <div class="stat-card"><div class="sv" id="statPct"></div><div class="sl">正答率</div></div>
    </div>

    <div class="review-list">
      <div class="review-head">問題別結果</div>
      <div id="reviewItems"></div>
    </div>

    <div class="result-btns">
      <button class="btn btn-primary" id="retrySameBtn" onclick="UI.restartSameSettings()">同じ設定で再挑戦</button>
      <button class="btn btn-accent" id="retryWrongBtn" onclick="UI.restartWrongOnly()">間違えた問題に再挑戦</button>
      <button class="btn btn-ghost" onclick="UI.goSetup()">設定に戻る</button>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="ui.js"></script>
</body>
</html>
